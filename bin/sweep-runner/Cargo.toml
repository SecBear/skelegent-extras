[package]
name = "sweep-runner"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "CLI runner for the golden decision sweep pipeline"

[[bin]]
name = "sweep-runner"
path = "src/main.rs"

[dependencies]
layer0 = { path = "../../../neuron/layer0", version = "0.4.0", features = ["test-utils"] }
neuron-turn = { path = "../../../neuron/turn/neuron-turn", version = "0.4.0" }
neuron-op-sweep = { path = "../../op/neuron-op-sweep" }
neuron-orch-kit = { path = "../../orch/neuron-orch-kit" }
neuron-client-parallel = { path = "../../client/neuron-client-parallel" }
neuron-state-sqlite = { path = "../../state/neuron-state-sqlite" }
neuron-provider-anthropic = { path = "../../../neuron/provider/neuron-provider-anthropic" }
neuron-auth = { path = "../../../neuron/auth/neuron-auth", version = "0.4.0" }
neuron-auth-pi = { path = "../../auth/neuron-auth-pi" }
neuron-auth-omp = { path = "../../auth/neuron-auth-omp" }

anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
