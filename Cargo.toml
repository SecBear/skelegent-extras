[workspace]
resolver = "3"
members = [
  "op/neuron-op-sweep",
  "orch/neuron-orch-sweep",
  "orch/neuron-orch-temporal",
  "state/neuron-state-sqlite",
  "state/neuron-state-cozo",
  "effects/neuron-effects-git",
  "auth/neuron-auth-oauth",
  "auth/neuron-auth-pi",
  "auth/neuron-auth-omp",
]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/secbear/neuron-extras"
homepage = "https://github.com/secbear/neuron-extras"
